# .github/workflows/deploy.yml
name: Build, Test & Deploy to ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: securebankapp
  ECS_CLUSTER: securebankapp-cluster
  ECS_SERVICE: securebankapp-service
  HEALTH_CHECK_URL: https://d3ho4d9vv7u6jf.cloudfront.net/health

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: LINT & TEST
  # ──────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8 bandit

      - name: Lint (flake8)
        run: |
          flake8 app/ --max-line-length=100 --exclude=__pycache__
          if [ -d "lambda/" ]; then flake8 lambda/ --max-line-length=100; fi

      - name: Security scan (bandit)
        run: |
          bandit -r app/ -ll
          if [ -d "lambda/" ]; then bandit -r lambda/ -ll; fi

      - name: Run tests
        run: |
          if [ -d "tests/" ]; then
            pytest tests/ -v --cov=app --cov-report=xml
          else
            echo "No tests directory found — skipping tests"
          fi

  # ──────────────────────────────────────────────────────────────
  # JOB 2: BUILD & PUSH TO ECR
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/securebankapp-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$TAG .
          docker tag $REGISTRY/$ECR_REPOSITORY:$TAG $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────
  # JOB 3: DEPLOY TO ECS
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/securebankapp-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service to stabilize (max 10 min)
        run: |
          echo "Waiting for ECS service to stabilize..."
          TIMEOUT=600  # 10 minutes in seconds
          INTERVAL=20
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RUNNING=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].runningCount' --output text)

            DESIRED=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].desiredCount' --output text)

            echo "Running: $RUNNING / Desired: $DESIRED (elapsed: $ELAPSED s)"

            if [ "$RUNNING" = "$DESIRED" ] && [ "$RUNNING" != "0" ]; then
              echo "Service is stable!"
              exit 0
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "ERROR: ECS service did not stabilize within 10 minutes"
          aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --region ${{ env.AWS_REGION }}
          exit 1

      - name: Verify deployment with health check
        run: |
          echo "Verifying deployment..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.HEALTH_CHECK_URL }})
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check failed (status $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Health check failed after 2 minutes"
          exit 1